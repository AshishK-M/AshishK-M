<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#203a43"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Orbit path (ellipse) -->
    <path id="orbit1" d="M450,140 m-160,0 a160,55 0 1,1 320,0 a160,55 0 1,1 -320,0" fill="none"/>
    <path id="orbit2" d="M450,140 m-120,0 a120,100 0 1,1 240,0 a120,100 0 1,1 -240,0" fill="none"/>
    <path id="orbit3" d="M450,140 m-200,0 a200,30 0 1,1 400,0 a200,30 0 1,1 -400,0" fill="none"/>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#a8d8ea" stroke-width="0.5">
    <line x1="0" y1="56" x2="900" y2="56"/>
    <line x1="0" y1="112" x2="900" y2="112"/>
    <line x1="0" y1="168" x2="900" y2="168"/>
    <line x1="0" y1="224" x2="900" y2="224"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
  </g>

  <!-- ========== LEFT SECTION: Code rain / typing ========== -->
  <!-- Scrolling code lines -->
  <g font-family="'Courier New', monospace" font-size="11" fill="#26d97f" opacity="0.55">
    <text x="20" y="30">
      <tspan>const dev = new FullStack();</tspan>
      <animate attributeName="y" values="30;-10;30" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.1;0.55" dur="8s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="55">
      <tspan>dev.stack = ['React','Next.js']</tspan>
      <animate attributeName="y" values="55;15;55" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.05;0.4" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="80">
      <tspan>  .push('Node','TypeScript');</tspan>
      <animate attributeName="y" values="80;40;80" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="105">
      <tspan>dev.deploy({ cloud: 'AWS' });</tspan>
      <animate attributeName="y" values="105;65;105" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.05;0.45" dur="10s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="130" fill="#61dafb" opacity="0.6">
      <tspan>// 5 yrs · Dubai, UAE 🇦🇪</tspan>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="160" fill="#f7df1e">
      <tspan>await db.query(PostgreSQL);</tspan>
      <animate attributeName="y" values="160;120;160" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="11s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="185" fill="#a8d8ea">
      <tspan>return { status: 200, msg:</tspan>
      <animate attributeName="y" values="185;145;185" dur="8.5s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="205" fill="#a8d8ea">
      <tspan>  'Ship. Scale. Repeat.' };</tspan>
      <animate attributeName="y" values="205;165;205" dur="8.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Cursor blink -->
  <rect x="20" y="218" width="8" height="14" fill="#26d97f" rx="1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ========== CENTER SECTION: Orbiting tech atoms ========== -->
  <!-- Core nucleus -->
  <circle cx="450" cy="140" r="26" fill="#0d1117" stroke="#a8d8ea" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
  <text x="450" y="135" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#a8d8ea" font-weight="bold">FULL</text>
  <text x="450" y="148" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#a8d8ea" font-weight="bold">STACK</text>

  <!-- Nucleus pulse ring -->
  <circle cx="450" cy="140" r="26" fill="none" stroke="#a8d8ea" stroke-width="1">
    <animate attributeName="r" values="26;38;26" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbit ring 1 (horizontal) -->
  <ellipse cx="450" cy="140" rx="160" ry="55" fill="none" stroke="#a8d8ea" stroke-width="0.5" opacity="0.2"/>
  <!-- Orbit ring 2 (tilted vertical) -->
  <ellipse cx="450" cy="140" rx="120" ry="100" fill="none" stroke="#61dafb" stroke-width="0.5" opacity="0.15"/>
  <!-- Orbit ring 3 (flat) -->
  <ellipse cx="450" cy="140" rx="200" ry="30" fill="none" stroke="#26d97f" stroke-width="0.5" opacity="0.18"/>

  <!-- === ORBITING TECH NODES === -->

  <!-- React - orbit 1 horizontal -->
  <g filter="url(#glow)">
    <animateMotion dur="7s" repeatCount="indefinite" path="M450,140 m-160,0 a160,55 0 1,1 320,0 a160,55 0 1,1 -320,0"/>
    <circle r="22" fill="#20232a" stroke="#61dafb" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#61dafb" font-weight="bold">React</text>
  </g>

  <!-- Node.js - orbit 1 horizontal (opposite) -->
  <g filter="url(#glow)">
    <animateMotion dur="7s" begin="-3.5s" repeatCount="indefinite" path="M450,140 m-160,0 a160,55 0 1,1 320,0 a160,55 0 1,1 -320,0"/>
    <circle r="22" fill="#1a2a1a" stroke="#339933" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#339933" font-weight="bold">Node</text>
  </g>

  <!-- TypeScript - orbit 2 tilted -->
  <g filter="url(#glow)">
    <animateMotion dur="9s" repeatCount="indefinite" path="M450,140 m-120,0 a120,100 0 1,1 240,0 a120,100 0 1,1 -240,0"/>
    <rect x="-18" y="-18" width="36" height="36" rx="6" fill="#1a1a3e" stroke="#3178c6" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#3178c6" font-weight="bold">TS</text>
  </g>

  <!-- Next.js - orbit 2 tilted (opposite) -->
  <g filter="url(#glow)">
    <animateMotion dur="9s" begin="-4.5s" repeatCount="indefinite" path="M450,140 m-120,0 a120,100 0 1,1 240,0 a120,100 0 1,1 -240,0"/>
    <circle r="20" fill="#111" stroke="#ffffff" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#ffffff" font-weight="bold">Next</text>
  </g>

  <!-- AWS - orbit 3 flat -->
  <g filter="url(#glow)">
    <animateMotion dur="5s" repeatCount="indefinite" path="M450,140 m-200,0 a200,30 0 1,1 400,0 a200,30 0 1,1 -400,0"/>
    <rect x="-20" y="-14" width="40" height="28" rx="5" fill="#1a1500" stroke="#ff9900" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#ff9900" font-weight="bold">AWS</text>
  </g>

  <!-- PostgreSQL - orbit 3 flat (opposite) -->
  <g filter="url(#glow)">
    <animateMotion dur="5s" begin="-2.5s" repeatCount="indefinite" path="M450,140 m-200,0 a200,30 0 1,1 400,0 a200,30 0 1,1 -400,0"/>
    <circle r="20" fill="#0d1a3e" stroke="#4169e1" stroke-width="1.5"/>
    <text y="4" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#4169e1" font-weight="bold">PG</text>
  </g>

  <!-- ========== RIGHT SECTION: Skill bars ========== -->
  <g font-family="'Courier New', monospace" font-size="11">

    <!-- Title -->
    <text x="680" y="38" fill="#a8d8ea" font-size="12" font-weight="bold" opacity="0.9">// skill_levels.json</text>

    <!-- React bar -->
    <text x="660" y="65" fill="#61dafb" opacity="0.85">React / Next.js</text>
    <rect x="660" y="70" width="210" height="6" rx="3" fill="#1a2a3a"/>
    <rect x="660" y="70" width="0" height="6" rx="3" fill="#61dafb" opacity="0.85">
      <animate attributeName="width" values="0;195;195" dur="2s" fill="freeze"/>
    </rect>

    <!-- Node.js bar -->
    <text x="660" y="100" fill="#339933" opacity="0.85">Node.js / Express</text>
    <rect x="660" y="105" width="210" height="6" rx="3" fill="#1a2a1a"/>
    <rect x="660" y="105" width="0" height="6" rx="3" fill="#339933" opacity="0.85">
      <animate attributeName="width" values="0;185;185" dur="2.3s" fill="freeze"/>
    </rect>

    <!-- TypeScript bar -->
    <text x="660" y="135" fill="#3178c6" opacity="0.85">TypeScript</text>
    <rect x="660" y="140" width="210" height="6" rx="3" fill="#0d1020"/>
    <rect x="660" y="140" width="0" height="6" rx="3" fill="#3178c6" opacity="0.85">
      <animate attributeName="width" values="0;190;190" dur="2.1s" fill="freeze"/>
    </rect>

    <!-- PostgreSQL bar -->
    <text x="660" y="170" fill="#4169e1" opacity="0.85">PostgreSQL</text>
    <rect x="660" y="175" width="210" height="6" rx="3" fill="#0d0d25"/>
    <rect x="660" y="175" width="0" height="6" rx="3" fill="#4169e1" opacity="0.85">
      <animate attributeName="width" values="0;175;175" dur="2.5s" fill="freeze"/>
    </rect>

    <!-- AWS bar -->
    <text x="660" y="205" fill="#ff9900" opacity="0.85">AWS / Cloud</text>
    <rect x="660" y="210" width="210" height="6" rx="3" fill="#1a1000"/>
    <rect x="660" y="210" width="0" height="6" rx="3" fill="#ff9900" opacity="0.85">
      <animate attributeName="width" values="0;165;165" dur="2.7s" fill="freeze"/>
    </rect>

    <!-- Floating particles on right -->
    <circle cx="875" cy="60" r="2" fill="#a8d8ea" opacity="0.6">
      <animate attributeName="cy" values="60;245;60" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="120" r="1.5" fill="#61dafb" opacity="0.5">
      <animate attributeName="cy" values="120;20;120" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="885" cy="180" r="2" fill="#26d97f" opacity="0.5">
      <animate attributeName="cy" values="180;60;180" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Divider lines -->
  <line x1="280" y1="20" x2="280" y2="260" stroke="#a8d8ea" stroke-width="0.4" opacity="0.15"/>
  <line x1="640" y1="20" x2="640" y2="260" stroke="#a8d8ea" stroke-width="0.4" opacity="0.15"/>

  <!-- Bottom tagline -->
  <text x="450" y="265" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#a8d8ea" opacity="0.45">
    Senior Full-Stack Developer · Dubai, UAE · React · Next.js · Node.js · TypeScript · PostgreSQL · AWS
  </text>

</svg>